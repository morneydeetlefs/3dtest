<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Simple WebXR AR - Pin 3D Object</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        body { margin:0; overflow:hidden; background:#000; font-family:system-ui; }
        #startBtn {
            position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            z-index:100; padding:20px 40px; font-size:22px; background:rgba(0,255,136,0.95);
            color:#000; border:none; border-radius:50px; box-shadow:0 10px 30px rgba(0,0,0,0.5);
        }
        #message {
            position:fixed; top:20px; left:50%; transform:translateX(-50%);
            background:rgba(0,0,0,0.7); color:white; padding:12px 20px; border-radius:12px;
            display:none; z-index:101; text-align:center; max-width:90%;
        }
    </style>
</head>
<body>
    <button id="startBtn">Start AR Camera</button>
    <div id="message"></div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const messageEl = document.getElementById('message');

        startBtn.addEventListener('click', async () => {
            startBtn.style.display = 'none';

            if (!navigator.xr) {
                showMessage("WebXR is not supported on this browser/device.");
                return;
            }

            try {
                // More compatible feature request
                const session = await navigator.xr.requestSession('immersive-ar', {
                    requiredFeatures: ['hit-test'],           // hit-test is widely supported
                    optionalFeatures: ['local-floor']         // plane-detection removed (too experimental)
                });

                showMessage("✅ AR session started!<br>Point at a flat surface.");

                // Basic Three.js + XR setup
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera();
                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });

                // Lighting
                scene.add(new THREE.AmbientLight(0xffffff, 0.8));
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
                dirLight.position.set(5, 10, 7);
                scene.add(dirLight);

                // Your virtual object (easy to replace)
                const geometry = new THREE.BoxGeometry(0.6, 0.6, 0.6);
                const material = new THREE.MeshPhongMaterial({ color: 0x00ff88, shininess: 90 });
                const object = new THREE.Mesh(geometry, material);
                scene.add(object);

                // Attach XR session
                renderer.xr.enabled = true;
                await renderer.xr.setSession(session);

                // Hit test for placing on real surfaces
                let hitTestSource = null;
                session.requestReferenceSpace('viewer').then((refSpace) => {
                    session.requestHitTestSource({ space: refSpace }).then((source) => {
                        hitTestSource = source;
                    });
                });

                let refSpace = null;
                session.requestReferenceSpace('local-floor').then((space) => { refSpace = space; });

                // Animation loop
                renderer.setAnimationLoop((time, frame) => {
                    if (frame && hitTestSource && refSpace) {
                        const hitResults = frame.getHitTestResults(hitTestSource);
                        if (hitResults.length > 0) {
                            const pose = hitResults[0].getPose(refSpace);
                            if (pose) {
                                object.position.setFromMatrixPosition(pose.transform.matrix);
                                object.quaternion.setFromRotationMatrix(pose.transform.matrix);
                                object.visible = true;
                            }
                        }
                    }
                    renderer.render(scene, camera);
                });

            } catch (err) {
                console.error(err);
                let msg = "AR session failed: " + err.message;
                if (err.message.includes("not supported")) {
                    msg = "immersive-ar not supported on this device/browser.<br>Try Android Chrome or enable flags.";
                }
                showMessage(msg);
            }
        });

        function showMessage(text) {
            messageEl.innerHTML = text;
            messageEl.style.display = 'block';
        }
    </script>
</body>
</html>
