<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MindAR Test - Working Version</title>

    <!-- Import map for modern ES modules -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
        }
    }
    </script>

    <style>
        body { margin:0; overflow:hidden; background:#000; font-family:system-ui; }
        #startBtn {
            position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            z-index:100; padding:20px 40px; font-size:22px;
            background:rgba(0,255,136,0.95); color:#000; border:none;
            border-radius:50px; box-shadow:0 10px 30px rgba(0,0,0,0.5);
        }
        #status {
            position:fixed; top:20px; left:50%; transform:translateX(-50%);
            background:rgba(0,0,0,0.75); color:white; padding:12px 20px;
            border-radius:12px; z-index:101; display:none; text-align:center;
            max-width:90%;
        }
    </style>
</head>
<body>
    <button id="startBtn">Start AR Camera</button>
    <div id="status">Point camera at your anchor image</div>

    <script type="module">
        import * as THREE from 'three';
        import { MindARThree } from 'mindar-image-three';

        const startBtn = document.getElementById('startBtn');
        const status = document.getElementById('status');

        startBtn.addEventListener('click', async () => {
            startBtn.style.display = 'none';
            status.style.display = 'block';
            status.textContent = "📷 Point camera at your printed anchor";

            try {
                const mindarThree = new MindARThree({
                    container: document.body,
                    imageTargetSrc: 'https://morneydeetlefs.github.io/3dtest/my-anchor.mind',   // ← change this for GitHub
                    filterMinCF: 0.001,
                    filterBeta: 100
                });

                const { renderer, scene, camera } = mindarThree;

                // Simple 3D box
                const geometry = new THREE.BoxGeometry(1, 1, 1);
                const material = new THREE.MeshPhongMaterial({ 
                    color: 0x00ff88, 
                    shininess: 100 
                });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(0, 0.5, 0);

                const anchor = mindarThree.addAnchor(0);
                anchor.group.add(mesh);

                // Lighting
                scene.add(new THREE.AmbientLight(0xffffff, 0.8));
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
                dirLight.position.set(5, 10, 7);
                scene.add(dirLight);

                anchor.onTargetFound = () => {
                    status.textContent = "✅ Anchor detected! Object pinned.";
                };
                anchor.onTargetLost = () => {
                    status.textContent = "Target lost — point at the image again";
                };

                await mindarThree.start();

                renderer.setAnimationLoop(() => {
                    mesh.rotation.y += 0.012;
                    renderer.render(scene, camera);
                });

            } catch (err) {
                console.error(err);
                status.textContent = "Error: " + err.message;
            }
        });
    </script>
</body>
</html>
